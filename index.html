<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백룸: 리얼리티 (하드코어 미로)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; }
       
        #vhs-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
       
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none;
        }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 20%, rgba(0,0,0,1) 100%);
            pointer-events: none;
        }

        .noise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.06;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            pointer-events: none;
        }

        #ui-layer {
            position: absolute; top: 30px; left: 30px; color: #fff;
            pointer-events: none; font-weight: bold; font-size: 1rem;
            text-shadow: 2px 2px 0px #000; display: flex; flex-direction: column; gap: 10px; z-index: 20;
        }

        .rec-indicator { display: flex; align-items: center; gap: 10px; color: #ff3333; }
        .rec-dot {
            width: 12px; height: 12px; background-color: #ff3333; border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        #message-box {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            color: #ffcc00; font-weight: bold; font-size: 1.2rem; text-shadow: 2px 2px 0px #000;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 20;
        }

        .stamina-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 250px; height: 4px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); display: none; z-index: 20;
        }
        #stamina-fill { width: 100%; height: 100%; background: #eee; transition: width 0.1s; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            border: 1px solid rgba(255,255,255,0.5); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 20;
        }

        .menu-screen {
            display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
            background: #050505; z-index: 100; color: white; text-align: center;
        }

        .btn {
            margin-top: 30px; padding: 12px 30px; background: none; color: #fff;
            border: 1px solid #555; cursor: pointer; transition: 0.2s; 
            font-family: 'Courier New', Courier, monospace; font-size: 1rem;
        }
        .btn:hover { background: #fff; color: #000; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="vhs-overlay">
        <div class="scanlines"></div><div class="vignette"></div><div class="noise"></div>
    </div>

    <div id="ui-layer">
        <div class="rec-indicator"><div class="rec-dot"></div> REC</div>
        <div id="level-status">LEVEL: 1 / 3</div>
        <div>BATTERY: <span id="ammo-count">8</span>%</div>
    </div>
   
    <div id="message-box"></div>
    <div id="crosshair"></div>
    <div class="stamina-bar" id="stamina-container"><div id="stamina-fill"></div></div>

    <div id="start-screen" class="menu-screen">
        <h1 style="letter-spacing: 8px; font-size: 2.5rem;">THE MAZE</h1>
        <p style="color: #666; font-size: 0.9rem;">당신은 혼자가 아닙니다. 멈추지 마십시오.<br>(사운드가 포함되어 있습니다)</p>
        <button class="btn" id="start-btn">연결 시작</button>
    </div>

    <div id="game-over-screen" class="menu-screen hidden">
        <h1 style="color: #600;">SIGNAL LOST</h1>
        <button class="btn" onclick="location.reload()">시스템 재부팅</button>
    </div>

    <div id="next-level-screen" class="menu-screen hidden">
        <h1 style="color: #aaa;">노클립(Noclip) 발생...</h1>
        <p id="next-level-text">더 깊은 곳으로 이동합니다.</p>
        <button class="btn" id="next-btn">계속</button>
    </div>

    <div id="win-screen" class="menu-screen hidden">
        <h1 style="color: #0f0;">YOU ESCAPED</h1>
        <p>현실로 돌아왔습니다. 하지만 정말로 끝일까요?</p>
        <button class="btn" onclick="location.reload()">다시 시작</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- Sound System ---
        let audioCtx;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playFootstep(isSprinting) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(isSprinting ? 0.3 : 0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playEntitySound(distance) {
            if (!audioCtx || distance > 15) return;
            const intensity = Math.max(0, 1 - (distance / 15));
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(50 + (Math.random() * 100), audioCtx.currentTime);
            gain.gain.setValueAtTime(intensity * 0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playShootSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // --- Core Variables ---
        let scene, camera, renderer, clock;
        let isLocked = false, isGameOver = false;
        let keys = { w: false, a: false, s: false, d: false, shift: false };
        let velocity = new THREE.Vector3();
        let yaw = 0, pitch = 0;
        let bobbing = 0, lastStepTime = 0;

        let stamina = 100, ammo = 8;
        const CHUNK_SIZE = 40; 
        const GRID_RES = 12;   
        const chunks = new Map();
        let colliders = [], exits = [], pickups = [];
        let entities = [];
        
        let currentLevel = 1;
        let matWall, matFloor, matCeil, flashlight;

        let gunGroup, muzzleFlash;
        let recoilAmount = 0;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.08); 

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1.5 : 1);
            document.body.appendChild(renderer.domElement);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(2, 1.7, 2); 
            scene.add(camera);

            clock = new THREE.Clock();

            matWall = new THREE.MeshStandardMaterial({ color: 0x998855, roughness: 1 });
            matFloor = new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 0.8 });
            matCeil = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 1 });

            flashlight = new THREE.SpotLight(0xffffff, 2.8, 38, Math.PI/3, 0.7, 1.5);
            camera.add(flashlight);
            camera.add(flashlight.target);
            flashlight.target.position.set(0,0,-1);

            scene.add(new THREE.AmbientLight(0x1a1a1a, 0.18));

            createGun();

            document.addEventListener('keydown', (e) => handleKey(e.code, true));
            document.addEventListener('keyup', (e) => handleKey(e.code, false));
            document.addEventListener('mousemove', (e) => {
                if(!isLocked) return;
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
            });
            document.addEventListener('mousedown', shoot);
            
            document.getElementById('start-btn').onclick = () => {
                initAudio();
                renderer.domElement.requestPointerLock();
                document.getElementById('start-screen').classList.add('hidden');
            };

            document.getElementById('next-btn').onclick = startNextLevel;

            document.addEventListener('pointerlockchange', () => {
                isLocked = document.pointerLockElement === renderer.domElement;
            });

            spawnLevel();
            animate();
        }

        function createGun() {
            gunGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.5), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 }));
            gunGroup.add(body);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4), new THREE.MeshStandardMaterial({ color: 0x050505 }));
            barrel.rotation.x = Math.PI / 2; barrel.position.z = -0.3;
            gunGroup.add(barrel);
            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.25, 0.1), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
            grip.position.y = -0.15; grip.position.z = 0.15; grip.rotation.x = -0.2;
            gunGroup.add(grip);
            muzzleFlash = new THREE.PointLight(0xffaa00, 0, 5);
            muzzleFlash.position.z = -0.6;
            gunGroup.add(muzzleFlash);
            const flashMesh = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 }));
            flashMesh.position.z = -0.6;
            gunGroup.add(flashMesh);
            muzzleFlash.mesh = flashMesh;
            gunGroup.position.set(0.3, -0.3, -0.5);
            camera.add(gunGroup);
        }

        function handleKey(code, val) {
            if(code === 'KeyW') keys.w = val;
            if(code === 'KeyS') keys.s = val;
            if(code === 'KeyA') keys.a = val;
            if(code === 'KeyD') keys.d = val;
            if(code === 'ShiftLeft') keys.shift = val;
        }

        function generateMaze(width, height, seed) {
            let random = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
            let maze = Array(height).fill().map(() => Array(width).fill(1));
            let stack = [[1, 1]]; maze[1][1] = 0;
            while (stack.length > 0) {
                let [x, y] = stack[stack.length - 1];
                let dirs = [[0, 2], [0, -2], [2, 0], [-2, 0]].filter(([dx, dy]) => {
                    let nx = x + dx, ny = y + dy;
                    return nx > 0 && nx < width - 1 && ny > 0 && ny < height - 1 && maze[ny][nx] === 1;
                });
                if (dirs.length > 0) {
                    let [dx, dy] = dirs[Math.floor(random() * dirs.length)];
                    maze[y + dy / 2][x + dx / 2] = 0; maze[y + dy][x + dx] = 0; stack.push([x + dx, y + dy]);
                } else stack.pop();
            }
            return maze;
        }

        function buildChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;
            const group = new THREE.Group();
            const mazeSize = GRID_RES;
            const cellSize = CHUNK_SIZE / mazeSize;
            const maze = generateMaze(mazeSize + 1, mazeSize + 1, Math.abs(cx * 13 + cz * 37 + currentLevel));
            const wallGeo = new THREE.BoxGeometry(cellSize + 0.1, 4, cellSize + 0.1);
            for (let y = 0; y <= mazeSize; y++) {
                for (let x = 0; x <= mazeSize; x++) {
                    const px = cx * CHUNK_SIZE + x * cellSize;
                    const pz = cz * CHUNK_SIZE + y * cellSize;
                    if (Math.abs(px - 2) < 4 && Math.abs(pz - 2) < 4) continue;
                    if (maze[y][x] === 1) {
                        const wall = new THREE.Mesh(wallGeo, matWall);
                        wall.position.set(px, 2, pz);
                        group.add(wall); colliders.push(wall);
                    }
                }
            }
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE), matFloor);
            floor.rotation.x = -Math.PI/2;
            floor.position.set(cx * CHUNK_SIZE + CHUNK_SIZE/2, 0, cz * CHUNK_SIZE + CHUNK_SIZE/2);
            group.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE), matCeil);
            ceil.rotation.x = Math.PI/2;
            ceil.position.set(cx * CHUNK_SIZE + CHUNK_SIZE/2, 4, cz * CHUNK_SIZE + CHUNK_SIZE/2);
            group.add(ceil);

            if (Math.random() > 0.8) {
                const item = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
                item.position.set(cx * CHUNK_SIZE + Math.random() * CHUNK_SIZE, 0.5, cz * CHUNK_SIZE + Math.random() * CHUNK_SIZE);
                pickups.push(item); group.add(item);
            }

            // Exit Spawning (2 Exits per Level)
            if (Math.random() > 0.93 && exits.length < 2) { 
                const exit = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 }));
                exit.position.set(cx * CHUNK_SIZE + CHUNK_SIZE/2, 1.5, cz * CHUNK_SIZE + CHUNK_SIZE/2);
                const light = new THREE.PointLight(0xffffff, 2, 10);
                exit.add(light);
                exits.push(exit); group.add(exit);
            }

            scene.add(group);
            chunks.set(key, group);
        }

        function spawnLevel() {
            document.getElementById('level-status').innerText = `LEVEL: ${currentLevel} / 3`;
            entities.forEach(e => scene.remove(e.mesh));
            entities = [];
            
            // 엔티티 수를 1마리로 고정
            for(let i=0; i < 1; i++) {
                const entGroup = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2.5), new THREE.MeshBasicMaterial({ color: 0x000000 }));
                entGroup.add(body);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshBasicMaterial({ color: 0x000000 }));
                head.position.y = 1.4; entGroup.add(head);
                // 플레이어로부터 일정 거리 이상 떨어진 곳에서 스폰
                entGroup.position.set(20 + Math.random()*80, 1.25, 20 + Math.random()*80);
                scene.add(entGroup);
                entities.push({ mesh: entGroup, speed: 4.5 + (currentLevel * 1.0) }); // 속도는 단계마다 증가
            }
        }

        function shoot() {
            if(!isLocked || ammo <= 0 || isGameOver) return;
            recoilAmount = 0.15; ammo--;
            document.getElementById('ammo-count').innerText = ammo;
            playShootSound();
            muzzleFlash.intensity = 5; muzzleFlash.mesh.material.opacity = 0.8;
            setTimeout(() => { muzzleFlash.intensity = 0; muzzleFlash.mesh.material.opacity = 0; }, 50);
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(entities.map(e => e.mesh), true);
            if(hits.length > 0) {
                let hitObj = hits[0].object;
                while(hitObj.parent && !entities.find(e => e.mesh === hitObj)) hitObj = hitObj.parent;
                const ent = entities.find(e => e.mesh === hitObj);
                if(ent) {
                    // 퇴치 시 아주 멀리 텔레포트
                    ent.mesh.position.set(100 + Math.random()*100, 1.25, 100 + Math.random()*100);
                    showMessage("엔티티 퇴치! 잠시 동안 안전합니다.");
                }
            }
        }

        function showMessage(txt) {
            const box = document.getElementById('message-box');
            box.innerText = txt; box.style.opacity = 1;
            setTimeout(() => box.style.opacity = 0, 2000);
        }

        function startNextLevel() {
            if (currentLevel >= 3) {
                document.getElementById('next-level-screen').classList.add('hidden');
                document.getElementById('win-screen').classList.remove('hidden');
                return;
            }
            currentLevel++;
            chunks.forEach(c => scene.remove(c));
            chunks.clear();
            colliders = []; exits = []; pickups = [];
            camera.position.set(2, 1.7, 2);
            spawnLevel();
            document.getElementById('next-level-screen').classList.add('hidden');
            renderer.domElement.requestPointerLock();
            isGameOver = false;
        }

        function checkCollision(pos) {
            const radius = 0.4;
            for(let wall of colliders) {
                const box = new THREE.Box3().setFromObject(wall);
                const closest = new THREE.Vector3().copy(pos).clamp(box.min, box.max);
                if(pos.distanceTo(closest) < radius) return true;
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isLocked || isGameOver) return;

            const dt = Math.min(clock.getDelta(), 0.1);
            const cx = Math.floor(camera.position.x / CHUNK_SIZE);
            const cz = Math.floor(camera.position.z / CHUNK_SIZE);
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) buildChunk(cx+i, cz+j);

            let isRunning = keys.shift && stamina > 0;
            let currentSpeed = isRunning ? 9.0 : 5.5;
            if(isRunning && (keys.w||keys.s||keys.a||keys.d)) stamina -= dt * 30;
            else stamina = Math.min(100, stamina + dt * 20);
            
            const stamCont = document.getElementById('stamina-container');
            if(stamina < 100) {
                stamCont.style.display = 'block';
                document.getElementById('stamina-fill').style.width = stamina + '%';
            } else stamCont.style.display = 'none';

            const move = new THREE.Vector3();
            if(keys.w) move.z -= 1; if(keys.s) move.z += 1;
            if(keys.a) move.x -= 1; if(keys.d) move.x += 1;
            move.normalize().applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0)));
            
            velocity.copy(move).multiplyScalar(currentSpeed);
            const nextX = new THREE.Vector3(camera.position.x + velocity.x * dt, camera.position.y, camera.position.z);
            if(!checkCollision(nextX)) camera.position.x = nextX.x;
            const nextZ = new THREE.Vector3(camera.position.x, camera.position.y, camera.position.z + velocity.z * dt);
            if(!checkCollision(nextZ)) camera.position.z = nextZ.z;

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            
            if(move.length() > 0) {
                const stepInterval = isRunning ? 0.22 : 0.4;
                if (Date.now() - lastStepTime > stepInterval * 1000) {
                    playFootstep(isRunning);
                    lastStepTime = Date.now();
                }
                bobbing += dt * (isRunning ? 16 : 10);
                camera.position.y = 1.7 + Math.sin(bobbing) * 0.06;
                gunGroup.position.x = 0.3 + Math.cos(bobbing * 0.5) * 0.015;
                gunGroup.position.y = -0.3 + Math.sin(bobbing) * 0.02;
            } else {
                bobbing += dt * 2.5;
                gunGroup.position.y = -0.3 + Math.sin(bobbing) * 0.006;
            }

            gunGroup.position.z = -0.5 + recoilAmount;
            recoilAmount *= 0.82;

            let closestEntityDist = 100;
            entities.forEach(ent => {
                const dist = ent.mesh.position.distanceTo(camera.position);
                closestEntityDist = Math.min(closestEntityDist, dist);
                const dir = new THREE.Vector3().subVectors(camera.position, ent.mesh.position).normalize();
                ent.mesh.position.addScaledVector(dir, ent.speed * dt);
                ent.mesh.lookAt(camera.position.x, 1.25, camera.position.z);
                if(dist < 1.3) {
                    isGameOver = true; document.exitPointerLock();
                    document.getElementById('game-over-screen').classList.remove('hidden');
                }
            });

            if (Math.random() > 0.85) playEntitySound(closestEntityDist);

            pickups = pickups.filter(p => {
                if(camera.position.distanceTo(p.position) < 1.8) {
                    ammo = Math.min(20, ammo + 6);
                    document.getElementById('ammo-count').innerText = ammo;
                    p.parent.remove(p); showMessage("배터리 팩 획득"); return false;
                }
                return true;
            });

            exits.forEach(ex => {
                if(camera.position.distanceTo(ex.position) < 2.5) {
                    isGameOver = true;
                    document.exitPointerLock();
                    if(currentLevel >= 3) {
                        document.getElementById('win-screen').classList.remove('hidden');
                    } else {
                        document.getElementById('next-level-text').innerText = `Level ${currentLevel} 탈출 성공.`;
                        document.getElementById('next-level-screen').classList.remove('hidden');
                    }
                }
            });

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        init();
    </script>
</body>
</html>
